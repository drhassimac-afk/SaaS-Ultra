<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS ULTRA - تسجيل الدخول</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen text-slate-100">

    <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-700">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-indigo-500 tracking-wide">SaaS ULTRA 🔐</h1>
            <p class="text-slate-400 mt-2 text-sm">مرحباً بك مجدداً! قم بتسجيل الدخول لإدارة منصتك</p>
        </div>

        {% if error %}
        <div class="bg-red-500/10 border border-red-500 text-red-400 p-3 rounded-lg text-sm mb-6 text-center">
            {{ error }}
        </div>
        {% endif %}

        <form action="/login" methods="POST" method="POST" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">اسم المستخدم</label>
                <input type="text" name="username" required 
                       class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-100 placeholder-slate-500" 
                       placeholder="ادخل اسم المستخدم هنا">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">كلمة المرور</label>
                <input type="password" name="password" required 
                       class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-100 placeholder-slate-500" 
                       placeholder="••••••••">
            </div>

            <button type="submit" 
                    class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-lg shadow-lg hover:shadow-indigo-500/20 transition duration-200">
                تسجيل الدخول
            </button>
        </form>

        <div class="mt-8 text-center border-t border-slate-700 pt-4 text-sm text-slate-400">
            ليس لديك حساب؟ 
            <a href="/register" class="text-indigo-400 hover:underline font-medium">إنشاء حساب جديد</a>
        </div>
    </div>

</body>
</html>
