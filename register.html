<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SaaS ULTRA - إنشاء حساب جديد</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white d-flex align-items-center min-vh-screen">
<div class="container" style="max-width: 450px;">

  <div class="card bg-secondary text-white p-4 shadow-lg border-0 rounded-4">
    <h2 class="text-center mb-4">🆕 إنشاء حساب جديد</h2>

    <form action="/register" method="POST">
      {% if error %}
        <div class="alert alert-danger text-center" role="alert">
          {{ error }}
        </div>
      {% endif %}

      <div class="mb-3">
        <label class="form-label">اسم المستخدم</label>
        <input class="form-control" name="username" placeholder="Username" required>
      </div>

      <div class="mb-4">
        <label class="form-label">كلمة المرور</label>
        <input class="form-control" name="password" type="password" placeholder="Password" required>
      </div>

      <button type="submit" class="btn btn-success w-100 py-2 fw-bold">إنشاء الحساب والانطلاق 🚀</button>
    </form>
    
    <div class="text-center mt-3">
        <a href="/login" class="text-info text-decoration-none text-sm">لديك حساب بالفعل؟ تسجيل الدخول</a>
    </div>
  </div>

</div>
</body>
</html>
