<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS ULTRA - ترقية الحساب ⚡</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen text-slate-100">

    <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-indigo-500/30 text-center">
        <div class="text-6xl mb-4">🚀</div>
        <h1 class="text-3xl font-extrabold text-indigo-400 mb-2">انطلق إلى الباقة الاحترافية!</h1>
        <p class="text-slate-400 text-sm mb-6">افتح ميزات الطقس المؤتمت، الذكاء الاصطناعي، وعدد لا نهائي من المهام.</p>

        <div class="bg-slate-900/50 p-4 rounded-xl text-right space-y-3 mb-6 border border-slate-700">
            <div class="flex items-center gap-2">
                <span class="text-green-400">✓</span>
                <span>عدد مهام غير محدود (بدل 5 فقط)</span>
            </div>
            <div class="flex items-center gap-2">
                <span class="text-green-400">✓</span>
                <span>مساعد الطقس والإنتاجية الذكي الحركي</span>
            </div>
            <div class="flex items-center gap-2">
                <span class="text-green-400">✓</span>
                <span>دعم فني أولوي وميزات الذكاء الاصطناعي</span>
            </div>
        </div>

        <form action="/upgrade" method="POST">
            <button type="submit" 
                    class="w-full py-3 bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white font-bold rounded-lg shadow-lg hover:shadow-indigo-500/20 transition duration-200">
                تأكيد الترقية وتفعيل خطة PRO ⚡
            </button>
        </form>

        <a href="/dashboard" class="block mt-4 text-sm text-slate-500 hover:text-slate-400">العودة للوحة التحكم لاحقاً</a>
    </div>

</body>
</html>
